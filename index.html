<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Servo Control</title>
  <style>
    body { font-family: sans-serif; background: #111; color: white; padding: 20px; }
    label { display: block; margin: 10px 0; }
    input[type="range"] { width: 300px; }
  </style>
</head>
<body>
  <h1>Laser Control</h1>

  <button onclick="sendCommand('on')">Toggle Laser</button>

  <h2>Random Configuration</h2>
  <div style="display: flex; gap: 20px;">
        <div>
      <label>
        baseWalkUpdates:
        <input id="baseWalkUpdates" type="number" value="30" min="0" max="1000">
      </label>
      <label>
        deltaWalkUpdates:
        <input id="deltaWalkUpdates" type="number" value="100" min="0" max="1000">
      </label>
      <label>
        baseAngleAddition:
        <input id="baseAngleAddition" type="number" value="1.7" min="-1000" max="1000">
      </label>
      <label>
        deltaAngleAddition:
        <input id="deltaAngleAddition" type="number" value="1" min="-1000" max="1000">
      </label>
      <label>
        baseWaitTime:
        <input id="baseWaitTime" type="number" value="0.001" min="0" max="1000">
      </label>
      <label>
        deltaWaitTime:
        <input id="deltaWaitTime" type="number" value="0.008" min="-1000" max="1000">
      </label>
    </div>
  </div>

  <button onclick="startStreamRecording()">🎥 Start Video Recording</button>
  <button onclick="stopStreamRecording()">⏹ Stop & Download</button>
  <button onclick="randomWalk()">Random Walk</button>
  <button onclick="readLidar()">Read Lidar</button>

  <h2>Gamepad</h2>

  <div style="margin:10px 0;">
    <button id="videoFlipXBtn">🪞 Flip Video Horizontally</button>
    <button id="videoFlipYBtn">🪞 Flip Video Vertically</button>
    <button id="videoResetFlipBtn">↩️ Reset Video Flip</button>
  </div>


  <div style="display: flex; gap: 20px;">
    <div>
      <label>
        Horizontal Min:
        <input id="boundXMin" type="number" value="60" min="0" max="180">°
      </label>
      <label>
        Horizontal Max:
        <input id="boundXMax" type="number" value="180" min="0" max="180">°
      </label>
    </div>
    <div style="margin-top:10px;">
      <button id="flipXBtn">↔️ Flip Horizontal</button>
      <button id="flipYBtn">↕️ Flip Vertical</button>
    </div>
    <div>
      <label>
        Speed:
        <input id="Speed" type="number" value="10" min="0" max="360">°/s
      </label>
    </div>
    <div>
      <label>
        Vertical Min:
        <input id="boundYMin" type="number" value="80" min="0" max="180">°
      </label>
      <label>
        Vertical Max:
        <input id="boundYMax" type="number" value="145" min="0" max="180">°
      </label>
    </div>
  </div>

  <h1 style="text-align:center;">USB Cam MJPEG</h1>

  <div id="videoWrapper" style="display:block; margin:5px auto;">
    <img id="streamImg" src="https://catcam.online/stream" style="
      display:block;
      margin:5px auto;
    ">
  </div>
  <canvas id="recordCanvas" width="640" height="480" style="display:none;"></canvas>

  <canvas id="gamepad" style="
    display:block;
    margin:20px auto;
    background:#333;
    border:1px solid #888;
    touch-action:none;
    max-width: 850px;
    width:100%;
    height:auto;
  "></canvas>

  <div style="margin-top:10px;">
    <button id="recordBtn">🎙️ Record</button>
    <button id="replayBtn">🔁 Replay</button>
  </div>

  <label>
    <input type="checkbox" id="loopReplay">
    🔁 Loop Replay
  </label>
  <script>
    let ws;

    let recorder;
    let recordedChunks = [];
    let isRecordingVideo = false;
    const recordCanvas = document.getElementById("recordCanvas");
    const rctx = recordCanvas.getContext("2d");

    async function connectWebSocket() {
      const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
      const host = window.location.host;  // Includes port if non-standard (e.g., localhost:5000)
      ws = new WebSocket(`${protocol}//${host}/ws`);

      ws.onopen = () => console.log("WebSocket connected");
      ws.onmessage = e => console.log("[MSG]", e.data);
      ws.onerror = e => console.error("WebSocket error", e);
      ws.onclose = () => {
        console.warn("WebSocket closed, retrying in 2s...");
        setTimeout(connectWebSocket, 2000);
      };
    }

    function sendCommand(cmd) {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(cmd);
      }
    }
    connectWebSocket();

    const canvas = document.getElementById("gamepad"); // must be first
    const ctx = canvas.getContext("2d");
    const streamImg = document.getElementById("streamImg");
    const videoWrapper = document.getElementById("videoWrapper");

    document.getElementById("baseWalkUpdates").max = canvas.width;
    document.getElementById("deltaWalkUpdates").max = canvas.height;
    document.getElementById("baseAngleAddition").max = canvas.width;
    document.getElementById("deltaAngleAddition").max = canvas.width;
    document.getElementById("baseWaitTime").max = 10;   // reasonable
    document.getElementById("deltaWaitTime").max = 10;  // reasonable

    function resizeGamepadCanvas() {
      // 1. Canvas should fill available width
      const displayWidth = canvas.clientWidth;  
      const size = displayWidth;

      canvas.width = size;
      canvas.height = size;

      // 2. Make the video wrapper the exact same size
      videoWrapper.style.width = size + "px";
      videoWrapper.style.height = size + "px";

      // 3. Force video to stretch exactly to this size
      streamImg.style.width = size + "px";
      streamImg.style.height = size + "px";
      streamImg.style.objectFit = "cover";  // or "contain" if you want letterbox instead
    }

    window.addEventListener("resize", resizeGamepadCanvas);
    resizeGamepadCanvas();

    const boundXMinInput = document.getElementById("boundXMin");
    const boundXMaxInput = document.getElementById("boundXMax");
    const boundYMinInput = document.getElementById("boundYMin");
    const boundYMaxInput = document.getElementById("boundYMax");
    const loopReplayCheckbox = document.getElementById("loopReplay");

    let bounds = {
      xMin: 0, xMax: 180,
      yMin: 0, yMax: 180
    };

    function updateBounds() {
      bounds.xMin = parseFloat(boundXMinInput.value) || 0;
      bounds.xMax = parseFloat(boundXMaxInput.value) || 180;
      bounds.yMin = parseFloat(boundYMinInput.value) || 0;
      bounds.yMax = parseFloat(boundYMaxInput.value) || 180;
    }

    [boundXMinInput, boundXMaxInput, boundYMinInput, boundYMaxInput].forEach(input => {
      input.addEventListener("input", updateBounds);
    });

    updateBounds(); // initialize

    function drawVideoToCanvas() {
      if (!isRecordingVideo) return;

      rctx.drawImage(streamImg, 0, 0, recordCanvas.width, recordCanvas.height);
      requestAnimationFrame(drawVideoToCanvas); // keeps updating
    }


    async function startStreamRecording() {
      recordCanvas.width = streamImg.width;
      recordCanvas.height = streamImg.height;

      recordedChunks = [];
      const stream = recordCanvas.captureStream(24);
      recorder = new MediaRecorder(stream, { mimeType: "video/webm;codecs=vp9" });

      recorder.ondataavailable = e => {
        if (e.data.size > 0) recordedChunks.push(e.data);
      };
      recorder.onstop = () => {
        const blob = new Blob(recordedChunks, { type: "video/webm" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "recorded_stream.webm";
        a.click();
        URL.revokeObjectURL(url);
      };

      recorder.start();
      isRecordingVideo = true;

      drawVideoToCanvas(); // start the update loop
    }


    function stopStreamRecording() {
      if (recorder && isRecordingVideo) {
        isRecordingVideo = false;
        recorder.stop();
      }
    }

    streamImg.onload = () => {
      if (isRecordingVideo) {
        rctx.drawImage(streamImg, 0, 0, recordCanvas.width, recordCanvas.height);
      }
    };
    

    const recordBtn = document.getElementById("recordBtn");
    const replayBtn = document.getElementById("replayBtn");

    let isDragging = false;
    let targetX = 150, targetY = 150;

    let recording = false;
    let recordData = [];
    let recordStart = 0;

    function drawCrosshair(x, y) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.strokeStyle = "lime";
      ctx.beginPath();
      ctx.moveTo(x, 0);
      ctx.lineTo(x, canvas.height);
      ctx.moveTo(0, y);
      ctx.lineTo(canvas.width, y);
      ctx.stroke();
    }

    function handleInput(x, y) {
      const { x: angleX, y: angleY } = canvasToDegrees(x, y);
      sendCommand(`position:${angleX}:${angleY}`);
      drawCrosshair(x, y);

      if (recording) {
        const timestamp = performance.now() - recordStart;
        recordData.push({ angleX, angleY, timestamp });
      }
    }

    function getTouchPos(touch) {
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;

      const x = (touch.clientX - rect.left) * scaleX;
      const y = (touch.clientY - rect.top) * scaleY;
      return { x, y };
    }

    canvas.addEventListener("mousedown", e => {
      isDragging = true;
      const rect = canvas.getBoundingClientRect();
      targetX = e.clientX - rect.left;
      targetY = e.clientY - rect.top;
      handleInput(targetX, targetY);
    });

    canvas.addEventListener("mousemove", e => {
      if (isDragging) {
        const rect = canvas.getBoundingClientRect();
        targetX = e.clientX - rect.left;
        targetY = e.clientY - rect.top;
        handleInput(targetX, targetY);
      }
    });

    canvas.addEventListener("mouseup", () => isDragging = false);
    canvas.addEventListener("mouseleave", () => isDragging = false);

    canvas.addEventListener("touchstart", e => {
      e.preventDefault();
      isDragging = true;
      const pos = getTouchPos(e.touches[0]);
      targetX = pos.x;
      targetY = pos.y;
      handleInput(targetX, targetY);
    });

    canvas.addEventListener("touchmove", e => {
      e.preventDefault();
      if (isDragging && e.touches.length > 0) {
        const pos = getTouchPos(e.touches[0]);
        targetX = pos.x;
        targetY = pos.y;
        handleInput(targetX, targetY);
      }
    });

    canvas.addEventListener("touchend", () => isDragging = false);
    canvas.addEventListener("touchcancel", () => isDragging = false);

    drawCrosshair(targetX, targetY);

    recordBtn.addEventListener("click", () => {
      if (!recording) {
        recordData = [];
        recordStart = performance.now();
        recording = true;
        recordBtn.textContent = "🛑 Stop Recording";
      } else {
        recording = false;
        recordBtn.textContent = "🎙️ Record";
        console.log("🎥 Recorded frames:", recordData.length);
      }
    });

    replayBtn.addEventListener("click", async () => {
      if (recording || recordData.length === 0) return;

      do {
        for (let i = 0; i < recordData.length; i++) {
          const { angleX, angleY, timestamp } = recordData[i];
          const delay = i === 0 ? 0 : timestamp - recordData[i - 1].timestamp;
          await new Promise(res => setTimeout(res, delay));
          sendCommand(`position:${angleX}:${angleY}`);
          drawCrosshair(
            ((angleX - bounds.xMin) / (bounds.xMax - bounds.xMin)) * canvas.width,
            ((angleY - bounds.yMin) / (bounds.yMax - bounds.yMin)) * canvas.height
          );
        }
      } while (loopReplayCheckbox.checked);

      console.log("✅ Replay complete.");
    });

    let baseWalkUpdates   = 15;
    let deltaWalkUpdates  = 10;
    let baseAngleAddition = 10;
    let deltaAngleAddition= 15;
    let baseWaitTime      = 0.1;   // seconds
    let deltaWaitTime     = 0.1;   // seconds

    /* ---------- 2. Keep UI ↔ variables in sync ---------- */
    const randomInputs = [
      "baseWalkUpdates","deltaWalkUpdates",
      "baseAngleAddition","deltaAngleAddition",
      "baseWaitTime","deltaWaitTime"
    ].map(id => document.getElementById(id));
    function updateRandomVars() {
      baseWalkUpdates = parseFloat(document.getElementById("baseWalkUpdates").value) || 0;
      deltaWalkUpdates = parseFloat(document.getElementById("deltaWalkUpdates").value) || 0;
      baseAngleAddition = parseFloat(document.getElementById("baseAngleAddition").value) || 0;
      deltaAngleAddition = parseFloat(document.getElementById("deltaAngleAddition").value) || 0;
      baseWaitTime = parseFloat(document.getElementById("baseWaitTime").value) || 1E-12;
      deltaWaitTime = parseFloat(document.getElementById("deltaWaitTime").value) || 0;
    }

    randomInputs.forEach(inp => inp.addEventListener("input", updateRandomVars));
    updateRandomVars(); // initialize

    async function readLidar() {
      while(readLidar){
        sendCommand(`lidarRead`);
        await new Promise(resolve => setTimeout(resolve, 500));
      }
    }

    let randomWalking = false;
    
    async function randomWalk() {
      let currentX = canvas.width/2;
      let currentY = canvas.height/2;
      const leftBound = -canvas.width/2;
      const rightBound = canvas.width/2;
      const downBound = -canvas.height/2;
      const upBound = canvas.height/2;


      const sleep = ms => new Promise(resolve => setTimeout(resolve, ms));
      randomWalking = !randomWalking;
      while(randomWalking){
        const numSteps = Math.max(Math.round(baseWalkUpdates + deltaWalkUpdates * Math.random()),1);
        const distLeft = Math.abs(currentX - 500 - leftBound);
        const distRigh = Math.abs(currentX - 500 - rightBound);
        const probLeft = (1/1000 * currentX);
        const probRight = 1-probLeft;
        const probUp = (1/1000 * currentY);
        const probDown = 1-probUp;
        const directionX = Math.random() > probLeft ? Math.random() : -Math.random();
        const directionY = Math.random() > probUp ? Math.random() : -Math.random();
        for (let t = 0; t < numSteps; t++) {
          let xWalk = 0, yWalk = 0;

          xWalk = (baseAngleAddition + deltaAngleAddition * Math.random()) * directionX;
          yWalk = (baseAngleAddition + deltaAngleAddition * Math.random()) * directionY;
          
          const newX = currentX + xWalk
          const newY = currentY + yWalk

          handleInput(newX,newY)
          
          currentX = newX;
          currentY = newY;

          await sleep((baseWaitTime + deltaWaitTime * Math.random()) * 1000);
        }
      }
    }

    let flipX = false;
    let flipY = false;

    document.getElementById("flipXBtn").addEventListener("click", () => {
      flipX = !flipX;
      console.log("FlipX =", flipX);
    });

    document.getElementById("flipYBtn").addEventListener("click", () => {
      flipY = !flipY;
      console.log("FlipY =", flipY);
    });

    function canvasToDegrees(x, y) {
      let angleX = bounds.xMin + (x / canvas.width) * (bounds.xMax - bounds.xMin);
      let angleY = bounds.yMin + (y / canvas.height) * (bounds.yMax - bounds.yMin);

      if (flipX) {
        angleX = bounds.xMax - (angleX - bounds.xMin);
      }
      if (flipY) {
        angleY = bounds.yMax - (angleY - bounds.yMin);
      }

      return { x: Math.round(angleX), y: Math.round(angleY) };
    }

    const videoFlipXBtn = document.getElementById("videoFlipXBtn");
    const videoFlipYBtn = document.getElementById("videoFlipYBtn");
    const videoResetFlipBtn = document.getElementById("videoResetFlipBtn");

    // independent flip state for VIDEO ONLY
    let vFlipX = false;
    let vFlipY = true;

    function applyVideoFlip() {
      const sx = vFlipX ? -1 : 1;
      const sy = vFlipY ? -1 : 1;
      streamImg.style.transform = `scale(${sx}, ${sy})`;
      streamImg.style.transformOrigin = "center center";
    }

    applyVideoFlip();

    videoFlipXBtn.addEventListener("click", () => {
      vFlipX = !vFlipX;
      applyVideoFlip();
    });

    videoFlipYBtn.addEventListener("click", () => {
      vFlipY = !vFlipY;
      applyVideoFlip();
    });
  </script>
</body>
</html>
